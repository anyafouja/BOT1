name: Cachy Music Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"

concurrency:
  group: cachy-bot
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cookies_ok: ${{ steps.verify.outputs.cookies_ok }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq ffmpeg libopus0 python3 python3-pip python3-venv

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install -q -r requirements.txt

      - name: Create .env
        run: echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env

      - name: Decode cookies
        id: decode
        env:
          COOKIE_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$COOKIE_SECRET" ]; then
            printf "%s" "$COOKIE_SECRET" | base64 -d > cookies.txt
            echo "cookies.txt: $(wc -l < cookies.txt) lines, $(wc -c < cookies.txt) bytes"
            head -c 120 cookies.txt
          fi
          echo "cookies_ok=true" >> "$GITHUB_OUTPUT"

      - name: Test yt-dlp with cookies
        run: |
          . venv/bin/activate
          yt-dlp --cookies cookies.txt --remote-components ejs:github \
            -f bestaudio -j "https://www.youtube.com/watch?v=dQw4w9WgXcQ" \
            2>&1 | tail -1 | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK:', d.get('title','no title'))"

      - name: Upload cookies artifact
        uses: actions/upload-artifact@v4
        with:
          name: cookies.txt
          path: cookies.txt

  run-bot:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download cookies
        uses: actions/download-artifact@v4
        with:
          name: cookies.txt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          sudo apt install -y -qq ffmpeg libopus0
          pip install -q -r requirements.txt

      - name: Install deno
        run: curl -fsSL https://deno.land/install.sh | sh

      - name: Run bot
        env:
          YT_COOKIES_FILE: cookies.txt
          PATH: $HOME/.deno/bin:$PATH
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
          python main.py
