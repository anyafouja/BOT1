name: Cachy Music Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"
concurrency:
  group: cachy-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update -qq && sudo apt install -y -qq ffmpeg libopus0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: curl -fsSL https://deno.land/install.sh | sh && echo "$HOME/.deno/bin" >> $GITHUB_PATH
      - run: pip install -q -r requirements.txt
      - run: echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
      - run: printf "%s" "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt
      - run: python3 main.py
        env:
          YT_COOKIES_FILE: cookies.txt
