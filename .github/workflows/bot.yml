name: Cachy Music Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"
concurrency:
  group: cachy-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update -qq && sudo apt install -y -qq ffmpeg libopus0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements.txt
      - run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
          echo "LAVALINK_URI=${{ secrets.LAVALINK_URI || 'de-01.strixnodes.com:2010' }}" >> .env
          echo "LAVALINK_PASSWORD=${{ secrets.LAVALINK_PASSWORD || 'glace' }}" >> .env
      - run: python3 main.py
