name: Cachy Music Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"
concurrency:
  group: cachy-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: System deps
        run: sudo apt update -qq && sudo apt install -y -qq ffmpeg libopus0
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -q -r requirements.txt
      - name: Env
        run: echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
      - name: Cookies
        env:
          B64: ${{ secrets.YT_COOKIES }}
        run: printf "%s" "$B64" | base64 -d > cookies.txt
      - name: Test yt-dlp
        run: |
          python3 -c "
import yt_dlp
opts = {'format': 'bestaudio', 'cookiefile': 'cookies.txt', 'verbose': True}
with yt_dlp.YoutubeDL(opts) as ydl:
    d = ydl.extract_info('https://www.youtube.com/watch?v=dQw4w9WgXcQ', download=False)
    print('OK:', d.get('title'), len(d.get('formats',[])))
" 2>&1 | tee /tmp/yt.log
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: log
          path: /tmp/yt.log
      - name: Run bot
        env:
          YT_COOKIES_FILE: cookies.txt
        run: python3 main.py
