name: Cachy Music Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"
concurrency:
  group: cachy-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update -qq && sudo apt install -y -qq ffmpeg libopus0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements.txt
      - run: echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
      - name: setup cookies
        env:
          B64: ${{ secrets.YT_COOKIES }}
        run: printf "%s" "$B64" | base64 -d > cookies.txt
      - name: run
        env:
          YT_COOKIES_FILE: cookies.txt
        run: python3 main.py
