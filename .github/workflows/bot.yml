name: Cachy Music Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"
concurrency:
  group: cachy-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update -qq && sudo apt install -y -qq ffmpeg libopus0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -q -r requirements.txt
      - run: echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
      - name: download Lavalink
        run: curl -sL https://github.com/lavalink-devs/Lavalink/releases/download/4.2.2/Lavalink.jar -o Lavalink.jar
      - name: start Lavalink
        run: java -jar Lavalink.jar --config lavalink/application.yml &
      - name: wait for Lavalink
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:2333/ 2>/dev/null; then
              echo "Lavalink ready"
              break
            fi
            echo "Waiting for Lavalink... ($i)"
            sleep 2
          done
      - run: python3 main.py
